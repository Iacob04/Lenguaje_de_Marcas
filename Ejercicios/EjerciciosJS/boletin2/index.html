<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Boletín 2 – Arrays</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h2 { margin-top: 30px; }
    hr { margin: 20px 0; }
    input, button { margin: 4px; padding: 5px; }
    .out { margin-top: 8px; white-space: pre; }
  </style>
  <script src="boletin2.js"></script>
</head>
<body>

  <h1>Boletín 2 – Arrays</h1>

  <!-- EJERCICIO 1 -->
  <h2>Ejercicio 1 – Array de 10 múltiplos de 5 (primero ≥50, último ≤50)</h2>
  <button onclick="ejercicio1()">Generar</button>
  <div id="ej1" class="out"></div>
  <hr>

  <!-- EJERCICIO 2 -->
  <h2>Ejercicio 2 – Comparar dos arrays</h2>
  <input type="text" id="arr2a" placeholder="Array 1 (ej: 1,2,3)">
  <input type="text" id="arr2b" placeholder="Array 2 (ej: 3,1,2)">
  <button onclick="ejercicio2()">Comparar</button>
  <div id="ej2" class="out"></div>
  <hr>

  <!-- EJERCICIO 3 -->
  <h2>Ejercicio 3 – Elementos repetidos y sus posiciones</h2>
  <input type="text" id="arr3" placeholder="Array (ej: 1,2,3,2,4,1)">
  <button onclick="ejercicio3()">Detectar</button>
  <div id="ej3" class="out"></div>
  <hr>

  <!-- EJERCICIO 4 -->
  <h2>Ejercicio 4 – Array aleatorio ordenado en lista &lt;ul&gt;</h2>
  <button onclick="ejercicio4()">Generar y ordenar</button>
  <div id="ej4"></div>
  <hr>

  <!-- EJERCICIO 5 -->
  <h2>Ejercicio 5 – Último elemento de un array</h2>
  <input type="text" id="arr5" placeholder="Array (ej: 10,20,30)">
  <button onclick="ejercicio5()">Obtener último</button>
  <div id="ej5" class="out"></div>

</body>
</html>
