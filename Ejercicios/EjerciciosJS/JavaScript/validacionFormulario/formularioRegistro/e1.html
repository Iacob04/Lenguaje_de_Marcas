<!DOCTYPE html>
<html>

<head>
    <title>Ejercicio 1</title>
    <style>
        * {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        form {
            width: 450px;
            border: 1px solid;
            border-radius: 5px;
        }

        div {
            padding: 5px;
            margin: 10px;
        }

        label {
            display: block;
        }

        input,
        select {
            height: 25px;
            border-radius: 5px;
        }

        button {
            color: white;
            border-color: #0c8f1b;
            border-radius: 5px;
            background-color: #0c8f1b;
            padding: 5px;
            margin: 10px;
        }

        #error {
            display: none;
            color: rgb(237, 68, 68);
        }
    </style>
</head>

<body>
    <h1>Formulario de registro</h1>
    <form name="form1" onsubmit='return validar();'>
        <div>
            <label for='nombre'>Nombre *</label>
            <input type='text' name='nombre' id='nombre' required />
        </div>
        <div>
            <label for='apellido'>Apellido *</label> <!--FALTABA AÑADIR ESTO PROFE :)-->
            <input type='text' name='apellido' id='apellido' required />
        </div>
        <div>
            <label for='direccion'>Direccion *</label>
            <input type='text' name='direccion' id='direccion' required />
        </div>
        <div>
            <label for='edad'>Edad *</label>
            <input type='text' name='edad' id='edad' required />
        </div>
        
        <div>
            <label for='constrasena'>Constraseña *</label>
            <input type='password' name='constrasena' id='constrasena' required />
        </div>
        <div>
            <label for='repeContrasena'>Confirmar constraseña *</label>
            <input type='password' name='repeConstrasena' id='repeConstrasena' required />
        </div>

        <div>
            <label for='estudios'>Nivel de sEstudios *</label>
            <select id='estudios' name='estudios' required>
                <option value=''>Selecciona</option>
                <option>Ninguno</option>
                <option>Primarios</option>
                <option>Bachiller</option>
                <option>Grado</option>
                <option>Master</option>
            </select>
        </div>
        <div>
            <label>
                <input type='checkbox' value='SI' id='acepto' required />
                He leido y acepto las condiciones.
            </label>
        </div>
        <div>
            <span id="error">Algunos campos no son correctos, revísalos</span>
        </div>
        <button onclick="validar()">Registrarse</button>
    </form>
    <script src="document.js"></script>

</body>

</html>
