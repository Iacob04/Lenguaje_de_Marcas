<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alta en Tuenti</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <div class="logo">
        <img src="logotuenti.png" alt="Tuenti">
    </div>

<div class="formulario">

    

 
    <div class="idioma">
        <select>
            <option>Español</option>
            <option>Inglés</option>
        </select>
    </div>

    <form>

        <label>Nombre</label>
        <div class="fila">
            <input type="text" placeholder="Nombre" required>
            <input type="text" placeholder="Apellidos" required>
        </div>

        <label>Email</label>
        <input type="email" required>

        <div class="sexo-linea">
            <span class="sexo-titulo">Sexo</span>
            <label><input type="radio" name="sexo" required> Hombre</label>
             <label><input type="radio" name="sexo"> Mujer</label>
        </div>


        

        <label>Fecha de nacimiento</label>
        <div class="fila">
            <select>
                <option>Día</option>
                <option>1</option><option>2</option><option>3</option><option>4</option>
                <option>5</option><option>6</option><option>7</option><option>8</option>
                <option>9</option><option>10</option><option>11</option><option>12</option>
                <option>13</option><option>14</option><option>15</option><option>16</option>
                <option>17</option><option>18</option><option>19</option><option>20</option>
                <option>21</option><option>22</option><option>23</option><option>24</option>
                <option>25</option><option>26</option><option>27</option><option>28</option>
                <option>29</option><option>30</option><option>31</option>
            </select>

            <select>
                <option>Mes</option>
                <option>Enero</option>
                <option>Febrero</option>
                <option>Marzo</option>
                <option>Abril</option>
                <option>Mayo</option>
                <option>Junio</option>
                <option>Julio</option>
                <option>Agosto</option>
                <option>Septiembre</option>
                <option>Octubre</option>
                <option>Noviembre</option>
                <option>Diciembre</option>
            </select>

            <select>
                <option>Año</option>
                <option>2026</option>
                <option>2025</option>
                <option>2024</option>
                <option>2023</option>
            </select>
        </div>

        <label>Contraseña</label>
        <input type="password" required>

        <label>Número de móvil</label>
        <div class="fila">
            <select>
                <option>+34 E</option>
            </select>
            <input type="tel" required>
        </div>

        <div class="condiciones">
            <input type="checkbox" required>
            Acepto las 
            <a href="http://www.ticarte.com">Condiciones de uso</a>,
            la <a href="http://www.ticarte.com">Política de privacidad</a> y
            el <a href="http://www.ticarte.com">Aviso legal</a>.
        </div>

        <button type="submit">¡Disfruta de Tuenti!</button>

    </form>
</div>

</body>
</html>
